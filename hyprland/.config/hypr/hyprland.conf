monitor=eDP-1,2560x1600@60Hz,0x0,1

general{
    gaps_in=2
    gaps_out=0
    border_size=1

    col.active_border = rgba(ff0000ff)
    col.inactive_border = rgba(444444ff)

    layout = dwindle #choix entre dwindle et master
}

decoration {
    rounding = 8

    blur {
        enabled =false
        size = 3
        passes = 1
    }
}

animations {
    enabled = true

    animation = windows, 1, 3,default,slide
    animation = fade, 0, 0, default
    animation = workspaces, 1, 5, default
}

xwayland {
    force_zero_scaling = true
}

input {
    kb_layout = fr
}

env = BROWSER, firefox

exec-once = gnome-keyring-daemon --start --components=secrets,pkcs11
exec-once = waybar
exec-once = hyprpaper
exec-once = sleep 2 && hyprctl hyprpaper wallpaper ",/home/michka/perso/wallpaper/right_1920x1080.png"
exec-once = dunst # notifications
exec-once = nextcloud
exec-once = hypridle # mise en veille automatique
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store


$mainMod = SUPER
$terminal = kitty
$fileManager = nemo
$menu = wofi --show drun

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, P, exec, ~/.config/hypr/script/poweroff.sh
bind = $mainMod SHIFT, O, exec, ~/.config/hypr/script/reboot.sh
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, R, exec, firefox
bind = $mainMod, J, exec, ~/.config/hypr/script/switching-monitor.sh

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, code:10, workspace, 1
bind = $mainMod, code:11, workspace, 2
bind = $mainMod, code:12, workspace, 3
bind = $mainMod, code:13, workspace, 4
bind = $mainMod, code:14, workspace, 5
bind = $mainMod, code:15, workspace, 6
bind = $mainMod, code:16, workspace, 7
bind = $mainMod, code:17, workspace, 8
bind = $mainMod, code:18, workspace, 9
bind = $mainMod, code:19, workspace, 10
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, code:10, movetoworkspace, 1
bind = $mainMod SHIFT, code:11, movetoworkspace, 2
bind = $mainMod SHIFT, code:12, movetoworkspace, 3
bind = $mainMod SHIFT, code:13, movetoworkspace, 4
bind = $mainMod SHIFT, code:14, movetoworkspace, 5
bind = $mainMod SHIFT, code:15, movetoworkspace, 6
bind = $mainMod SHIFT, code:16, movetoworkspace, 7
bind = $mainMod SHIFT, code:17, movetoworkspace, 8
bind = $mainMod SHIFT, code:18, movetoworkspace, 9
bind = $mainMod SHIFT, code:19, movetoworkspace, 10

#Navigation entre fenêtres
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

#Redimensionner les fenêtres
bind = $mainMod CTRL, left, resizeactive, -50 0
bind = $mainMod CTRL, right, resizeactive, 50 0
bind = $mainMod CTRL, up, resizeactive, 0 -50
bind = $mainMod CTRL, down, resizeactive, 0 50

#Déplacer les fenêtres (swap)
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

#Plein écran
bind = $mainMod, F, fullscreen, 0

#Multimédia
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

#Capture d'écran
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | tee ~/screenshots/screenshot-$(date +%s).png | wl-copy

#presse-papier
bind = $mainMod SHIFT, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
