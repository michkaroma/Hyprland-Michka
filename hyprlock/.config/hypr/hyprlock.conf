#source = ~/.config/hypr/mocha.conf #pour plus de couleur

$black = rgb(000000)
$white = rgb(ffffff)
$blackAlpha = 000000ff
$whiteAlpha = ffffffff
$accent = $white
$font = JetBrainsMono Nerd Font

general {
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor =
    path = ~/.config/backgrounds/shaded.png
    blur_passes = 2
    color = $black
}

label {
    monitor =
    text = cmd[update:30000] echo "$(date +"%R")"
    color = $white
    font_size = 90
    font_family = $font
    position = -30, 0
    halign = right
    valign = top
}

label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %d %B %Y")"
    color = $white
    font_size = 25
    font_family = $font
    position = -30, -150
    halign = right
    valign = top
}

image {
    monitor =
    path = ~/.face
    size = 100
    border_color = $accent
    position = 0, 75
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $accent
    inner_color = $black
    font_color = $white
    fade_on_empty = false
    placeholder_text = <span foreground="##$whiteAlpha"><i>󰌾 Logged in as </i><span foreground="##$whiteAlpha">$USER</span></span>
    hide_input = false
    check_color = $accent
    fail_color = $red
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $yellow
    position = 0, -35
    halign = center
    valign = center
}